name: Build Executa Binary

# Builds the research-processor Executa into standalone, per-platform binaries
# and attaches them to a GitHub Release. The tool is ESM with no runtime deps,
# so we bundle it to a single CommonJS file (esbuild) then package with pkg.
#
# Trigger: push a tag like `executa-v0.2.0`  →  release with 3 binaries.
# Then in the Anna Tool Console set distribution_type = Binary and paste the
# release asset URLs for each platform.

on:
  push:
    tags:
      - 'executa-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            asset: research-processor-linux-x86_64
          - os: macos-13
            target: node18-macos-x64
            asset: research-processor-darwin-x86_64
          - os: macos-14
            target: node18-macos-arm64
            asset: research-processor-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bundle ESM -> single CommonJS file
        working-directory: executas/research-processor-node
        run: |
          npx --yes esbuild index.js \
            --bundle --platform=node --format=cjs --target=node18 \
            --outfile=dist/research-processor.cjs

      - name: Package standalone binary
        working-directory: executas/research-processor-node
        run: |
          npx --yes @yao-pkg/pkg dist/research-processor.cjs \
            --targets ${{ matrix.target }} \
            --output dist/${{ matrix.asset }}

      - name: Smoke test (describe responds)
        if: matrix.os == 'ubuntu-latest'
        working-directory: executas/research-processor-node
        run: |
          chmod +x dist/${{ matrix.asset }}
          echo '{"jsonrpc":"2.0","method":"describe","id":1}' | ./dist/${{ matrix.asset }} | head -c 400
          echo

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: executas/research-processor-node/dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
